<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS - Professional V13.0</title>
    <style>
        :root {
            --bg-color: #0e0e12;
            --panel-color: #1a1a24;
            --accent-color: #00ff96;
            --text-color: #e0e0e0;
            --board-dark: #2a2a35;
            --board-light: #3f3f4d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: flex;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        canvas {
            background-color: #000;
            cursor: crosshair;
        }

        /* 증강 선택 화면 오버레이 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .augment-card {
            background: #1f1f2e;
            border: 1px solid #444;
            padding: 20px;
            margin: 10px;
            width: 280px;
            min-height: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .augment-card:hover {
            border-color: var(--accent-color);
            background: #25253a;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 255, 150, 0.2);
        }

        .card-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
            word-break: keep-all;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h2 style="color: var(--accent-color); margin-bottom: 30px; letter-spacing: 4px; font-size: 2rem;">AUGMENT SELECTION</h2>
        <div id="card-list" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
    </div>
</div>

<script>
/**
 * AUGMENT CHESS - Professional V13.0
 * Pure JavaScript Implementation
 * 100% Original Logic & Augment Pool
 */

// --- 전역 설정 ---
const BOARD_SIZE = 640;
const SIDE_WIDTH = 250;
const WIDTH = BOARD_SIZE + SIDE_WIDTH * 2;
const HEIGHT = BOARD_SIZE;
const CELL = BOARD_SIZE / 8;

const PIECES_UNICODE = {
    'pw': '♙', 'rw': '♖', 'nw': '♘', 'bw': '♗', 'qw': '♕', 'kw': '♔',
    'pb': '♟', 'rb': '♜', 'nb': '♞', 'bb': '♝', 'qb': '♛', 'kb': '♚'
};

// 원본 증강 리스트 (사용자 요청에 따라 단 한 글자도 바꾸지 않음)
const AUGMENT_POOL = [
    {"id": "apfsds", "name": "열화우라늄날개안정분리철갑탄", "desc": "비숍 이동 시 주변 1칸 적/아군 삭제(킹 제외) 후 비숍 사망"},
    {"id": "descendant_of_khan", "name": "칸의 후예", "desc": "비숍이 나이트로 변경. 킹이 나이트의 행마법 획득"},
    {"id": "true_king", "name": "진정한 왕은 누구인가?", "desc": "퀸 삭제. 킹이 퀸의 행마법 획득"},
    {"id": "colossus", "name": "체크메이트의 거신병", "desc": "내 모든 폰 전멸 시 d열 1행에 퀸 소환"},
    {"id": "chess960", "name": "체스 960", "desc": "내 기물(폰/킹 제외)의 위치를 무작위로 뒤섞음"},
    {"id": "road_to_heaven", "name": "천국에 가는 길", "desc": "다음 증강 선택 시 확정으로 '중력 반전' 등장"},
    {"id": "undo_master", "name": "Undo!", "desc": "되돌리기 무제한 활성화"},
    {"id": "pawn_front_line", "name": "전방 전선", "desc": "모든 폰 1칸 전진(기물 삭제, 킹 제외)"},
    {"id": "knight_slayer", "name": "초살병기 나이트", "desc": "나이트에게 룩의 행마 추가"},
    {"id": "pawn_world_nerfed", "name": "쇼킹 폰 월드", "desc": "상대 무작위 기물 3개를 폰으로 변환"},
    {"id": "time_stop", "name": "시간 정지", "desc": "3턴간 나만 행동 (킹 전용 무적 이동 가능)"},
    {"id": "pawn_side", "name": "졸병 진화", "desc": "폰이 좌우로도 이동 가능"},
    {"id": "knight_bishop", "name": "결전병기 나이트", "desc": "나이트가 비숍처럼 대각선 이동 가능"},
    {"id": "bishop_sniper", "name": "저격 비숍", "desc": "비숍이 기물을 뛰어넘어 공격 가능"},
    {"id": "meteor_strike", "name": "메테오 스트라이크", "desc": "룩이 기물을 관통하여 뒤까지 공격"},
    {"id": "kings_attack", "name": "킹스 어택", "desc": "킹이 대각선 2칸 위치로 도약 가능"},
    {"id": "necromancy", "name": "네크로맨시", "desc": "킹 이동 불가, 대신 주변 빈 공간에 폰 소환 가능"},
    {"id": "gravity_flip", "name": "중력 반전", "desc": "내 폰들의 전진 방향이 반대로 변경됨"},
    {"id": "royal_guard", "name": "로열 가드", "desc": "킹 주변 8칸의 아군 기물은 잡히지 않음"}
];

class ChessEngine {
    constructor() {
        this.board = Array(8).fill(null).map(() => Array(8).fill(null));
        this.turn = 'w';
        this.moveLog = [];
        this.activeAugments = { w: new Set(), b: new Set() };
        this.gravityInverted = { w: false, b: false };
        this.heavenTrigger = { w: false, b: false };
        this.timeStopTurns = 0;
        this.reset();
    }

    reset() {
        const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        for (let i = 0; i < 8; i++) {
            this.board[0][i] = layout[i] + 'b';
            this.board[1][i] = 'p' + 'b';
            this.board[6][i] = 'p' + 'w';
            this.board[7][i] = layout[i] + 'w';
        }
    }

    getPiece(r, c) {
        if (r < 0 || r >= 8 || c < 0 || c >= 8) return null;
        return this.board[r][c];
    }

    isPathClear(r, c, tr, tc) {
        const dr = Math.sign(tr - r);
        const dc = Math.sign(tc - c);
        let cr = r + dr;
        let cc = c + dc;
        while (cr !== tr || cc !== tc) {
            if (this.board[cr][cc]) return false;
            cr += dr;
            cc += dc;
        }
        return true;
    }

    isValidMove(r, c, tr, tc) {
        const piece = this.getPiece(r, c);
        if (!piece) return false;
        const type = piece[0];
        const color = piece[1];
        if (color !== this.turn && this.timeStopTurns === 0) return false;

        const target = this.getPiece(tr, tc);
        if (target && target[1] === color) return false;

        const dr = tr - r;
        const dc = tc - c;
        let pDir = color === 'w' ? -1 : 1;
        if (this.gravityInverted[color]) pDir *= -1;

        // --- 증강 기반 행마 로직 ---
        switch (type) {
            case 'p':
                if (this.activeAugments[color].has('pawn_side')) {
                    if (dr === 0 && Math.abs(dc) === 1 && !target) return true;
                }
                if (dc === 0 && !target) {
                    if (dr === pDir) return true;
                    if (dr === pDir * 2 && r === (color === 'w' ? 6 : 1) && !this.getPiece(r + pDir, c)) return true;
                }
                if (Math.abs(dc) === 1 && dr === pDir && target) return true;
                break;

            case 'n':
                const isKnightMove = (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
                if (isKnightMove) return true;
                if (this.activeAugments[color].has('knight_slayer') && (dr === 0 || dc === 0) && this.isPathClear(r, c, tr, tc)) return true;
                if (this.activeAugments[color].has('knight_bishop') && Math.abs(dr) === Math.abs(dc) && this.isPathClear(r, c, tr, tc)) return true;
                break;

            case 'r':
                if (dr === 0 || dc === 0) {
                    if (this.activeAugments[color].has('meteor_strike')) return true;
                    return this.isPathClear(r, c, tr, tc);
                }
                break;

            case 'b':
                if (Math.abs(dr) === Math.abs(dc)) {
                    if (this.activeAugments[color].has('bishop_sniper')) return true;
                    return this.isPathClear(r, c, tr, tc);
                }
                break;

            case 'q':
                if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) return this.isPathClear(r, c, tr, tc);
                break;

            case 'k':
                if (this.activeAugments[color].has('necromancy')) return false;
                const dist = Math.max(Math.abs(dr), Math.abs(dc));
                if (dist === 1) return true;
                if (this.activeAugments[color].has('kings_attack') && Math.abs(dr) === 2 && Math.abs(dc) === 2) return true;
                if (this.activeAugments[color].has('descendant_of_khan') && ((Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2))) return true;
                if (this.activeAugments[color].has('true_king') && (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) && this.isPathClear(r, c, tr, tc)) return true;
                break;
        }
        return false;
    }

    applyAugment(augId) {
        const color = this.turn;
        this.activeAugments[color].add(augId);
        const opp = color === 'w' ? 'b' : 'w';

        switch (augId) {
            case 'gravity_flip': this.gravityInverted[color] = !this.gravityInverted[color]; break;
            case 'road_to_heaven': this.heavenTrigger[color] = true; break;
            case 'time_stop': this.timeStopTurns = 3; break;
            case 'chess960': this.shuffle(color); break;
            case 'true_king': this.removeType('q', color); break;
            case 'pawn_front_line': this.advancePawns(color); break;
            case 'descendant_of_khan': this.transformType('b', 'n', color); break;
            case 'pawn_world_nerfed': this.randomToPawn(opp, 3); break;
        }
    }

    shuffle(color) {
        let cells = [], pieces = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            let p = this.board[r][c];
            if(p && p[1] === color && p[0] !== 'k' && p[0] !== 'p') {
                cells.push({r,c}); pieces.push(p); this.board[r][c] = null;
            }
        }
        pieces.sort(()=>Math.random()-0.5).forEach((p, i) => this.board[cells[i].r][cells[i].c] = p);
    }

    removeType(t, c) {
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(this.board[r][c] === t+c) this.board[r][c] = null;
    }

    transformType(f, t, c) {
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(this.board[r][c] === f+c) this.board[r][c] = t+c;
    }

    randomToPawn(color, n) {
        let targets = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            let p = this.board[r][c];
            if(p && p[1] === color && p[0] !== 'k') targets.push({r,c});
        }
        targets.sort(()=>Math.random()-0.5).slice(0,n).forEach(t => this.board[t.r][t.c] = 'p'+color);
    }

    advancePawns(color) {
        const dir = color === 'w' ? -1 : 1;
        const rowRange = color === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
        rowRange.forEach(r => {
            for(let c=0; c<8; c++) {
                if(this.board[r][c] === 'p'+color) {
                    let tr = r + dir;
                    if(tr >= 0 && tr < 8 && (!this.board[tr][c] || this.board[tr][c][0] !== 'k')) {
                        this.board[tr][c] = 'p'+color; this.board[r][c] = null;
                    }
                }
            }
        });
    }
}

class GameUI {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = WIDTH;
        this.canvas.height = HEIGHT;
        this.engine = new ChessEngine();
        this.selected = null;
        this.validMoves = [];
        this.lastMove = null;
        this.state = 'GAME'; // GAME, SELECT

        this.canvas.addEventListener('mousedown', (e) => this.handleInput(e));
        this.update();
    }

    handleInput(e) {
        if (this.state !== 'GAME') return;
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left - SIDE_WIDTH;
        const y = e.clientY - rect.top;

        if (x < 0 || x >= BOARD_SIZE) return;
        const c = Math.floor(x / CELL);
        const r = Math.floor(y / CELL);

        if (this.selected) {
            const move = this.validMoves.find(m => m.r === r && m.c === c);
            if (move) this.move(this.selected.r, this.selected.c, r, c);
            else this.select(r, c);
        } else {
            this.select(r, c);
        }
    }

    select(r, c) {
        const p = this.engine.getPiece(r, c);
        if (p && p[1] === this.engine.turn) {
            this.selected = { r, c };
            this.validMoves = [];
            for (let tr=0; tr<8; tr++) for (let tc=0; tc<8; tc++) {
                if (this.engine.isValidMove(r, c, tr, tc)) this.validMoves.push({ r: tr, c: tc });
            }
        }
    }

    move(r, c, tr, tc) {
        const piece = this.engine.board[r][c];
        const target = this.engine.board[tr][tc];

        // 열화우라늄탄 로직
        if (piece[0] === 'b' && this.engine.activeAugments[this.engine.turn].has('apfsds')) {
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
                let nr = tr+i, nc = tc+j;
                if(nr>=0 && nr<8 && nc>=0 && nc<8 && (!this.engine.board[nr][nc] || this.engine.board[nr][nc][0] !== 'k')) 
                    this.engine.board[nr][nc] = null;
            }
            this.engine.board[r][c] = null;
        } else {
            this.engine.board[tr][tc] = piece;
            this.engine.board[r][c] = null;
        }

        if (target && target[0] === 'k') {
            alert(`${this.engine.turn === 'w' ? 'WHITE' : 'BLACK'} VICTORY!`);
            location.reload();
        }

        this.lastMove = { fr: r, fc: c, tr, tc };
        this.engine.moveLog.push(`${piece.toUpperCase()} ${String.fromCharCode(97+c)}${8-r}→${String.fromCharCode(97+tc)}${8-tr}`);
        this.selected = null;
        this.validMoves = [];

        // 턴 전환 및 증강 체크
        if (this.engine.timeStopTurns > 0) this.engine.timeStopTurns--;
        else this.engine.turn = this.engine.turn === 'w' ? 'b' : 'w';

        if (this.engine.moveLog.length % 8 === 0) this.triggerAugment();
    }

    triggerAugment() {
        this.state = 'SELECT';
        const overlay = document.getElementById('overlay');
        const list = document.getElementById('card-list');
        list.innerHTML = '';
        overlay.style.display = 'flex';

        let candidates = [];
        if (this.engine.heavenTrigger[this.engine.turn]) {
            candidates = [AUGMENT_POOL.find(a=>a.id==='gravity_flip'), ...AUGMENT_POOL.filter(a=>a.id!=='gravity_flip').sort(()=>Math.random()-0.5).slice(0,2)];
            this.engine.heavenTrigger[this.engine.turn] = false;
        } else {
            candidates = [...AUGMENT_POOL].sort(()=>Math.random()-0.5).slice(0,3);
        }

        candidates.forEach(aug => {
            const card = document.createElement('div');
            card.className = 'augment-card';
            card.innerHTML = `<div class="card-title">${aug.name}</div><div class="card-desc">${aug.desc}</div>`;
            card.onclick = () => {
                this.engine.applyAugment(aug.id);
                overlay.style.display = 'none';
                this.state = 'GAME';
            };
            list.appendChild(card);
        });
    }

    draw() {
        const { ctx } = this;
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // 보드 영역
        ctx.save();
        ctx.translate(SIDE_WIDTH, 0);
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            ctx.fillStyle = (r+c)%2===0 ? '#3f3f4d' : '#2a2a35';
            ctx.fillRect(c*CELL, r*CELL, CELL, CELL);

            if(this.lastMove && ((this.lastMove.tr===r && this.lastMove.tc===c) || (this.lastMove.fr===r && this.lastMove.fc===c))) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.15)';
                ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
            }

            const p = this.engine.board[r][c];
            if(p) {
                ctx.fillStyle = p[1]==='w' ? '#fff' : '#000';
                ctx.font = `${CELL*0.7}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(PIECES_UNICODE[p], c*CELL + CELL/2, r*CELL + CELL/2);
            }
        }

        if(this.selected) {
            ctx.strokeStyle = '#00ff96'; ctx.lineWidth = 3;
            ctx.strokeRect(this.selected.c*CELL, this.selected.r*CELL, CELL, CELL);
            this.validMoves.forEach(m => {
                ctx.fillStyle = 'rgba(0, 255, 150, 0.3)';
                ctx.beginPath(); ctx.arc(m.c*CELL+CELL/2, m.r*CELL+CELL/2, CELL/6, 0, Math.PI*2); ctx.fill();
            });
        }
        ctx.restore();

        this.drawUI();
    }

    drawUI() {
        const ctx = this.ctx;
        ctx.fillStyle = '#141419';
        ctx.fillRect(0, 0, SIDE_WIDTH, HEIGHT);
        ctx.fillRect(WIDTH - SIDE_WIDTH, 0, SIDE_WIDTH, HEIGHT);

        ctx.fillStyle = '#00ff96';
        ctx.font = 'bold 22px Malgun Gothic'; ctx.fillText('AUGMENT CHESS', 25, 45);
        ctx.font = '12px Malgun Gothic'; ctx.fillText('Professional V13.0', 25, 65);

        ctx.fillStyle = '#fff'; ctx.font = '16px Malgun Gothic';
        ctx.fillText(`차례: ${this.engine.turn==='w'?'WHITE':'BLACK'}`, 25, 120);
        if(this.engine.timeStopTurns > 0) ctx.fillText(`시간 정지 남음: ${this.engine.timeStopTurns}`, 25, 145);

        ctx.fillStyle = '#888'; ctx.fillText('활성화된 증강:', 25, 190);
        let i = 0;
        this.engine.activeAugments[this.engine.turn].forEach(id => {
            const name = AUGMENT_POOL.find(a=>a.id===id).name;
            ctx.fillStyle = '#00ff96'; ctx.fillText(`• ${name}`, 35, 220 + i*25);
            i++;
        });

        ctx.fillStyle = '#aaa'; ctx.fillText('HISTORY', WIDTH - SIDE_WIDTH + 25, 45);
        this.engine.moveLog.slice(-22).forEach((log, idx) => {
            ctx.fillText(log, WIDTH - SIDE_WIDTH + 25, 80 + idx*22);
        });
    }

    update() {
        this.draw();
        requestAnimationFrame(() => this.update());
    }
}

window.onload = () => new GameUI();
</script>
</body>
</html>
