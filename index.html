<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS - Ultimate Recovery V13.1</title>
    <style>
        :root {
            --bg-color: #0e0e12;
            --panel-color: #1a1a24;
            --accent-color: #00ff96;
            --text-color: #e0e0e0;
            --board-dark-1: #2a2a35;
            --board-light-1: #3f3f4d;
            --board-dark-2: #4b3621;
            --board-light-2: #8b5a2b;
            --board-dark-3: #1a3a3a;
            --board-light-3: #2d5a5a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: flex;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        canvas {
            background-color: #000;
            cursor: pointer;
        }

        /* 공통 오버레이 스타일 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* 버튼 스타일 */
        .btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px 40px;
            margin: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 250px;
            text-align: center;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* 증강 카드 */
        #card-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .augment-card {
            background: #1f1f2e;
            border: 1px solid #444;
            padding: 20px;
            margin: 10px;
            width: 280px;
            min-height: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .augment-card:hover {
            border-color: var(--accent-color);
            background: #25253a;
            transform: translateY(-5px);
        }

        .card-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
        }

        /* 설정 창 */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .setting-item {
            text-align: left;
            padding: 10px;
            border: 1px solid #333;
        }

        #timer-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: var(--accent-color);
            font-family: monospace;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="timer-display">00:00</div>
    <canvas id="gameCanvas"></canvas>

    <!-- 메인 메뉴 -->
    <div id="menu-overlay" class="overlay" style="display: flex;">
        <h1 style="color: var(--accent-color); font-size: 3rem; margin-bottom: 50px; letter-spacing: 10px;">AUGMENT CHESS</h1>
        <div class="btn" onclick="ui.startGame()">START GAME</div>
        <div class="btn" onclick="ui.showSettings()">SETTINGS</div>
        <div class="btn" onclick="window.close()">EXIT</div>
    </div>

    <!-- 설정 창 -->
    <div id="settings-overlay" class="overlay">
        <h2 style="color: var(--accent-color);">SETTINGS</h2>
        <div class="settings-grid">
            <div class="setting-item">
                <p>BOARD THEME</p>
                <select id="board-theme" onchange="ui.updateTheme()">
                    <option value="1">Modern Dark (Default)</option>
                    <option value="2">Classic Wood</option>
                    <option value="3">Deep Sea</option>
                </select>
            </div>
            <div class="setting-item">
                <p>CHECKMATE MOTION</p>
                <input type="checkbox" id="cm-motion" checked> Enable
            </div>
        </div>
        <div class="btn" onclick="ui.hideSettings()" style="margin-top: 30px;">BACK</div>
    </div>

    <!-- 증강 선택 -->
    <div id="augment-overlay" class="overlay">
        <h2 id="augment-player-title" style="color: var(--accent-color); margin-bottom: 30px; letter-spacing: 4px;"></h2>
        <div id="card-list"></div>
    </div>

    <!-- 결과 창 -->
    <div id="result-overlay" class="overlay">
        <h2 id="result-text" style="color: var(--accent-color); font-size: 3rem;"></h2>
        <div class="btn" onclick="location.reload()">MAIN MENU</div>
    </div>
</div>

<script>
/**
 * AUGMENT CHESS - Ultimate Recovery V13.1
 * Core: 모든 로직 복구 및 확장
 */

const BOARD_SIZE = 640;
const SIDE_WIDTH = 250;
const WIDTH = BOARD_SIZE + SIDE_WIDTH * 2;
const HEIGHT = BOARD_SIZE;
const CELL = BOARD_SIZE / 8;

const PIECES_UNICODE = {
    'pw': '♙', 'rw': '♖', 'nw': '♘', 'bw': '♗', 'qw': '♕', 'kw': '♔',
    'pb': '♟', 'rb': '♜', 'nb': '♞', 'bb': '♝', 'qb': '♛', 'kb': '♚'
};

const AUGMENT_POOL = [
    {"id": "apfsds", "name": "열화우라늄날개안정분리철갑탄", "desc": "비숍 이동 시 주변 1칸 적/아군 삭제(킹 제외) 후 비숍 사망"},
    {"id": "descendant_of_khan", "name": "칸의 후예", "desc": "비숍이 나이트로 변경. 킹이 나이트의 행마법 획득"},
    {"id": "true_king", "name": "진정한 왕은 누구인가?", "desc": "퀸 삭제. 킹이 퀸의 행마법 획득"},
    {"id": "colossus", "name": "체크메이트의 거신병", "desc": "내 모든 폰 전멸 시 d열 1행에 퀸 소환"},
    {"id": "chess960", "name": "체스 960", "desc": "내 기물(폰/킹 제외)의 위치를 무작위로 뒤섞음"},
    {"id": "road_to_heaven", "name": "천국에 가는 길", "desc": "다음 증강 선택 시 확정으로 '중력 반전' 등장"},
    {"id": "undo_master", "name": "Undo!", "desc": "되돌리기 무제한 활성화"},
    {"id": "pawn_front_line", "name": "전방 전선", "desc": "모든 폰 1칸 전진(기물 삭제, 킹 제외)"},
    {"id": "knight_slayer", "name": "초살병기 나이트", "desc": "나이트에게 룩의 행마 추가"},
    {"id": "pawn_world_nerfed", "name": "쇼킹 폰 월드", "desc": "상대 무작위 기물 3개를 폰으로 변환"},
    {"id": "time_stop", "name": "시간 정지", "desc": "3턴간 나만 행동 (킹 전용 무적 이동 가능)"},
    {"id": "pawn_side", "name": "졸병 진화", "desc": "폰이 좌우로도 이동 가능"},
    {"id": "knight_bishop", "name": "결전병기 나이트", "desc": "나이트가 비숍처럼 대각선 이동 가능"},
    {"id": "bishop_sniper", "name": "저격 비숍", "desc": "비숍이 기물을 뛰어넘어 공격 가능"},
    {"id": "meteor_strike", "name": "메테오 스트라이크", "desc": "룩이 기물을 관통하여 뒤까지 공격"},
    {"id": "kings_attack", "name": "킹스 어택", "desc": "킹이 대각선 2칸 위치로 도약 가능"},
    {"id": "necromancy", "name": "네크로맨시", "desc": "킹 이동 불가, 대신 주변 빈 공간에 폰 소환 가능"},
    {"id": "gravity_flip", "name": "중력 반전", "desc": "내 폰들의 전진 방향이 반대로 변경됨"},
    {"id": "royal_guard", "name": "로열 가드", "desc": "킹 주변 8칸의 아군 기물은 잡히지 않음"}
];

class ChessEngine {
    constructor() {
        this.initGame();
    }

    initGame() {
        this.board = Array(8).fill(null).map(() => Array(8).fill(null));
        this.turn = 'w';
        this.moveLog = [];
        this.history = []; // For Undo
        this.activeAugments = { w: new Set(), b: new Set() };
        this.gravityInverted = { w: false, b: false };
        this.heavenTrigger = { w: false, b: false };
        this.timeStopTurns = 0;
        this.gameTime = 0;
        this.isGameOver = false;

        const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        for (let i = 0; i < 8; i++) {
            this.board[0][i] = layout[i] + 'b';
            this.board[1][i] = 'p' + 'b';
            this.board[6][i] = 'p' + 'w';
            this.board[7][i] = layout[i] + 'w';
        }
    }

    saveHistory() {
        this.history.push({
            board: JSON.parse(JSON.stringify(this.board)),
            turn: this.turn,
            activeAugments: { w: new Set(this.activeAugments.w), b: new Set(this.activeAugments.b) },
            gravityInverted: { ...this.gravityInverted },
            timeStopTurns: this.timeStopTurns
        });
        if (this.history.length > 50) this.history.shift();
    }

    undo() {
        if (this.history.length === 0) return;
        const last = this.history.pop();
        this.board = last.board;
        this.turn = last.turn;
        this.activeAugments = last.activeAugments;
        this.gravityInverted = last.gravityInverted;
        this.timeStopTurns = last.timeStopTurns;
        this.moveLog.pop();
    }

    getPiece(r, c) {
        if (r < 0 || r >= 8 || c < 0 || c >= 8) return null;
        return this.board[r][c];
    }

    isValidMove(r, c, tr, tc) {
        const piece = this.getPiece(r, c);
        if (!piece) return false;
        const color = piece[1];
        if (color !== this.turn && this.timeStopTurns === 0) return false;

        const target = this.getPiece(tr, tc);
        if (target && target[1] === color) return false;

        const type = piece[0];
        const dr = tr - r;
        const dc = tc - c;
        let pDir = color === 'w' ? -1 : 1;
        if (this.gravityInverted[color]) pDir *= -1;

        // Path checking helper
        const isPathClear = (r1, c1, r2, c2) => {
            const stepR = Math.sign(r2 - r1);
            const stepC = Math.sign(c2 - c1);
            let currR = r1 + stepR;
            let currC = c1 + stepC;
            while (currR !== r2 || currC !== c2) {
                if (this.board[currR][currC]) return false;
                currR += stepR; currC += stepC;
            }
            return true;
        };

        switch (type) {
            case 'p':
                if (this.activeAugments[color].has('pawn_side') && dr === 0 && Math.abs(dc) === 1 && !target) return true;
                if (dc === 0 && !target) {
                    if (dr === pDir) return true;
                    if (dr === pDir * 2 && r === (color === 'w' ? 6 : 1) && !this.getPiece(r + pDir, c)) return true;
                }
                if (Math.abs(dc) === 1 && dr === pDir && target) return true;
                break;
            case 'n':
                const isKnight = (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
                if (isKnight) return true;
                if (this.activeAugments[color].has('knight_slayer') && (dr === 0 || dc === 0) && isPathClear(r, c, tr, tc)) return true;
                if (this.activeAugments[color].has('knight_bishop') && Math.abs(dr) === Math.abs(dc) && isPathClear(r, c, tr, tc)) return true;
                break;
            case 'r':
                if (dr === 0 || dc === 0) return this.activeAugments[color].has('meteor_strike') || isPathClear(r, c, tr, tc);
                break;
            case 'b':
                if (Math.abs(dr) === Math.abs(dc)) return this.activeAugments[color].has('bishop_sniper') || isPathClear(r, c, tr, tc);
                break;
            case 'q':
                if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) return isPathClear(r, c, tr, tc);
                break;
            case 'k':
                if (this.activeAugments[color].has('necromancy')) return false;
                const dist = Math.max(Math.abs(dr), Math.abs(dc));
                if (dist === 1) return true;
                if (this.activeAugments[color].has('kings_attack') && Math.abs(dr) === 2 && Math.abs(dc) === 2) return true;
                if (this.activeAugments[color].has('descendant_of_khan') && isKnight) return true;
                if (this.activeAugments[color].has('true_king') && (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) && isPathClear(r, c, tr, tc)) return true;
                break;
        }
        return false;
    }
}

class GameUI {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = WIDTH;
        this.canvas.height = HEIGHT;
        this.engine = new ChessEngine();
        this.selected = null;
        this.validMoves = [];
        this.state = 'MENU';
        this.theme = 1;
        this.lastMove = null;
        this.pendingAugments = []; // 흑/백 순차 처리를 위한 큐

        setInterval(() => {
            if (this.state === 'GAME') this.engine.gameTime++;
            this.updateTimer();
        }, 1000);

        this.canvas.addEventListener('mousedown', (e) => this.handleInput(e));
        this.update();
    }

    startGame() {
        this.engine.initGame();
        this.state = 'GAME';
        document.getElementById('menu-overlay').style.display = 'none';
        document.getElementById('result-overlay').style.display = 'none';
    }

    showSettings() { document.getElementById('settings-overlay').style.display = 'flex'; }
    hideSettings() { document.getElementById('settings-overlay').style.display = 'none'; }
    updateTheme() { this.theme = parseInt(document.getElementById('board-theme').value); }

    updateTimer() {
        const m = Math.floor(this.engine.gameTime / 60).toString().padStart(2, '0');
        const s = (this.engine.gameTime % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }

    handleInput(e) {
        if (this.state !== 'GAME') return;
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // 버튼 영역 체크 (Undo/Reset)
        if (x < SIDE_WIDTH) {
            if (y > 550 && y < 600) this.engine.undo();
            if (y > 490 && y < 540) this.startGame();
            return;
        }

        const bx = x - SIDE_WIDTH;
        if (bx < 0 || bx >= BOARD_SIZE) return;
        const c = Math.floor(bx / CELL);
        const r = Math.floor(y / CELL);

        if (this.selected) {
            const move = this.validMoves.find(m => m.r === r && m.c === c);
            if (move) this.executeMove(this.selected.r, this.selected.c, r, c);
            else this.trySelect(r, c);
        } else {
            this.trySelect(r, c);
        }
    }

    trySelect(r, c) {
        const p = this.engine.getPiece(r, c);
        if (p && p[1] === this.engine.turn) {
            this.selected = { r, c };
            this.validMoves = [];
            for (let tr=0; tr<8; tr++) for (let tc=0; tc<8; tc++) {
                if (this.engine.isValidMove(r, c, tr, tc)) this.validMoves.push({ r: tr, tc });
            }
        }
    }

    executeMove(r, c, tr, tc) {
        this.engine.saveHistory();
        const piece = this.engine.board[r][c];
        const target = this.engine.board[tr][tc];

        // 킹 보호 (로열 가드)
        if (target && this.engine.activeAugments[target[1]].has('royal_guard')) {
            let kPos = null;
            for(let i=0; i<8; i++) for(let j=0; j<8; j++) if(this.engine.board[i][j]==='k'+target[1]) kPos={i,j};
            if(kPos && Math.max(Math.abs(tr-kPos.i), Math.abs(tc-kPos.j)) <= 1) {
                this.selected = null; return;
            }
        }

        // 증강 특수 로직 (열화우라늄)
        if (piece[0] === 'b' && this.engine.activeAugments[piece[1]].has('apfsds')) {
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
                let nr=tr+i, nc=tc+j;
                if(nr>=0 && nr<8 && nc>=0 && nc<8 && (!this.engine.board[nr][nc] || this.engine.board[nr][nc][0]!=='k')) this.engine.board[nr][nc]=null;
            }
            this.engine.board[r][c] = null;
        } else {
            this.engine.board[tr][tc] = piece;
            this.engine.board[r][c] = null;
        }

        this.lastMove = { fr: r, fc: c, tr, tc };
        this.engine.moveLog.push(`${piece.toUpperCase()} ${String.fromCharCode(97+c)}${8-r}→${String.fromCharCode(97+tc)}${8-tr}`);
        
        if (target && target[0] === 'k') this.endGame(piece[1]);

        if (this.engine.timeStopTurns > 0) this.engine.timeStopTurns--;
        else this.engine.turn = this.engine.turn === 'w' ? 'b' : 'w';

        this.selected = null;
        this.validMoves = [];

        // 8턴마다 증강 (흑백 모두에게 기회)
        if (this.engine.moveLog.length % 8 === 0) {
            this.pendingAugments = ['w', 'b'];
            this.processNextAugment();
        }
    }

    processNextAugment() {
        if (this.pendingAugments.length === 0) {
            this.state = 'GAME';
            return;
        }
        const color = this.pendingAugments.shift();
        this.showAugmentSelection(color);
    }

    showAugmentSelection(color) {
        this.state = 'SELECT';
        const overlay = document.getElementById('augment-overlay');
        const list = document.getElementById('card-list');
        const title = document.getElementById('augment-player-title');
        
        title.innerText = `${color === 'w' ? 'WHITE' : 'BLACK'} PLAYER AUGMENT`;
        list.innerHTML = '';
        overlay.style.display = 'flex';

        let candidates = [];
        if (this.engine.heavenTrigger[color]) {
            candidates = [AUGMENT_POOL.find(a=>a.id==='gravity_flip'), ...AUGMENT_POOL.filter(a=>a.id!=='gravity_flip').sort(()=>Math.random()-0.5).slice(0,2)];
            this.engine.heavenTrigger[color] = false;
        } else {
            candidates = [...AUGMENT_POOL].sort(()=>Math.random()-0.5).slice(0,3);
        }

        candidates.forEach(aug => {
            const card = document.createElement('div');
            card.className = 'augment-card';
            card.innerHTML = `<div class="card-title">${aug.name}</div><div class="card-desc">${aug.desc}</div>`;
            card.onclick = () => {
                this.applyAugment(aug.id, color);
                overlay.style.display = 'none';
                this.processNextAugment();
            };
            list.appendChild(card);
        });
    }

    applyAugment(id, color) {
        this.engine.activeAugments[color].add(id);
        const opp = color === 'w' ? 'b' : 'w';
        switch(id) {
            case 'gravity_flip': this.engine.gravityInverted[color] = !this.engine.gravityInverted[color]; break;
            case 'time_stop': this.engine.timeStopTurns = 3; break;
            case 'chess960': this.shuffleBoard(color); break;
            case 'pawn_world_nerfed': this.randomConvert(opp, 'p', 3); break;
            case 'road_to_heaven': this.engine.heavenTrigger[color] = true; break;
        }
    }

    shuffleBoard(color) {
        let pieces = [], pos = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            let p = this.engine.board[r][c];
            if(p && p[1]===color && p[0]!=='k' && p[0]!=='p') { pieces.push(p); pos.push({r,c}); this.engine.board[r][c]=null; }
        }
        pieces.sort(()=>Math.random()-0.5).forEach((p, i) => this.engine.board[pos[i].r][pos[i].c] = p);
    }

    randomConvert(color, type, n) {
        let targets = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            let p = this.engine.board[r][c];
            if(p && p[1]===color && p[0]!=='k') targets.push({r,c});
        }
        targets.sort(()=>Math.random()-0.5).slice(0,n).forEach(t => this.engine.board[t.r][t.c] = type+color);
    }

    endGame(winner) {
        this.state = 'RESULT';
        const overlay = document.getElementById('result-overlay');
        const text = document.getElementById('result-text');
        text.innerText = `${winner === 'w' ? 'WHITE' : 'BLACK'} VICTORY!`;
        overlay.style.display = 'flex';
    }

    draw() {
        const { ctx } = this;
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // Sidebar Left
        ctx.fillStyle = '#141419';
        ctx.fillRect(0, 0, SIDE_WIDTH, HEIGHT);
        
        // Sidebar Right
        ctx.fillRect(WIDTH - SIDE_WIDTH, 0, SIDE_WIDTH, HEIGHT);

        // Board
        ctx.save();
        ctx.translate(SIDE_WIDTH, 0);
        const dark = this.theme === 1 ? '#2a2a35' : (this.theme === 2 ? '#4b3621' : '#1a3a3a');
        const light = this.theme === 1 ? '#3f3f4d' : (this.theme === 2 ? '#8b5a2b' : '#2d5a5a');

        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            ctx.fillStyle = (r+c)%2===0 ? light : dark;
            ctx.fillRect(c*CELL, r*CELL, CELL, CELL);

            // Last move highlight
            if(this.lastMove && ((this.lastMove.tr===r && this.lastMove.tc===c) || (this.lastMove.fr===r && this.lastMove.fc===c))) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.1)';
                ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
            }

            const p = this.engine.board[r][c];
            if(p) {
                ctx.fillStyle = p[1]==='w' ? '#fff' : '#000';
                ctx.font = `${CELL*0.7}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(PIECES_UNICODE[p], c*CELL + CELL/2, r*CELL + CELL/2);
            }
        }

        // Selection & Valid Moves
        if(this.selected) {
            ctx.strokeStyle = '#00ff96'; ctx.lineWidth = 3;
            ctx.strokeRect(this.selected.c*CELL, this.selected.r*CELL, CELL, CELL);
            this.validMoves.forEach(m => {
                ctx.fillStyle = 'rgba(0, 255, 150, 0.3)';
                ctx.beginPath(); ctx.arc(m.tc*CELL+CELL/2, m.r*CELL+CELL/2, CELL/6, 0, Math.PI*2); ctx.fill();
            });
        }
        ctx.restore();

        // UI Text
        ctx.fillStyle = '#00ff96';
        ctx.font = 'bold 24px Malgun Gothic'; ctx.fillText('AUGMENT CHESS', 25, 50);
        ctx.font = '14px monospace'; ctx.fillText('V13.1 PROFESSIONAL', 25, 75);

        ctx.fillStyle = '#fff';
        ctx.font = '18px Malgun Gothic';
        ctx.fillText(`TURN: ${this.engine.turn==='w'?'WHITE':'BLACK'}`, 25, 130);
        
        // Buttons
        this.drawBtn(25, 500, 'RESET', '#ff4444');
        this.drawBtn(25, 560, 'UNDO', '#00ff96');

        // History
        ctx.fillStyle = '#888'; ctx.font = '14px Malgun Gothic';
        ctx.fillText('MOVE HISTORY', WIDTH-SIDE_WIDTH+25, 40);
        this.engine.moveLog.slice(-20).forEach((msg, i) => {
            ctx.fillText(msg, WIDTH-SIDE_WIDTH+25, 75 + i*25);
        });
    }

    drawBtn(x, y, txt, color) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(x, y, 200, 40);
        this.ctx.fillStyle = color;
        this.ctx.font = 'bold 16px Malgun Gothic';
        this.ctx.textAlign = 'center';
        this.ctx.fillText(txt, x + 100, y + 25);
        this.ctx.textAlign = 'left';
    }

    update() {
        this.draw();
        requestAnimationFrame(() => this.update());
    }
}

const ui = new GameUI();
</script>
