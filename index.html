<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUMENT CHESS ~the age of revolution~</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-dark: #0f0f12;
            --panel-dark: #1a1a20;
            --accent-gold: #c5a059;
            --board-light: #d1d5db;
            --board-dark: #4b5563;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* Board Themes */
        .theme-modern { --light: #d1d5db; --dark: #4b5563; }
        .theme-wood { --light: #e9d5b3; --dark: #8b4513; }
        .theme-ocean { --light: #a5f3fc; --dark: #0e7490; }

        #game-container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 300px;
            background: var(--panel-dark);
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        #board-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 70vh;
            height: 70vh;
            border: 5px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }

        .square.light { background-color: var(--light); }
        .square.dark { background-color: var(--dark); }
        .square.selected { background-color: rgba(197, 160, 89, 0.6) !important; }
        .square.highlight { background-color: rgba(255, 255, 0, 0.3) !important; }
        .square.last-move { background-color: rgba(100, 200, 100, 0.4) !important; }

        .piece {
            user-select: none;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* Augment Modal */
        #augment-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .augment-card {
            width: 240px;
            height: 340px;
            background: linear-gradient(135deg, #2a2a35 0%, #121215 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 15px;
            padding: 20px;
            margin: 0 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .augment-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 0 30px var(--accent-gold);
        }

        .card-title {
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.4;
        }

        /* Screen Shake */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake { animation: shake 0.5s; }

        /* Lobby */
        #lobby {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2a2a35 0%, #0f0f12 100%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn-gold {
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 12px 40px;
            font-size: 1.5rem;
            border-radius: 5px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-gold:hover {
            background: var(--accent-gold);
            color: black;
        }

        /* Notification for 3s delay */
        #status-notif {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(197, 160, 89, 0.9);
            color: black;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.4rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Captured pieces */
        .captured-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            min-height: 80px;
        }
    </style>
</head>
<body class="theme-modern">

    <!-- Status Notification -->
    <div id="status-notif">능력 발동 중...</div>

    <!-- Lobby -->
    <div id="lobby">
        <h1 class="cinzel text-6xl mb-4 text-[#c5a059]">ARGUMENT CHESS</h1>
        <p class="cinzel text-xl mb-12 tracking-widest opacity-70">~ the age of revolution ~</p>
        <button class="btn-gold cinzel" onclick="startGame()">ENTER THE ARENA</button>
        <button class="text-gray-500 mt-4 underline" onclick="showEncyclopedia()">증강 도감 (Encyclopedia)</button>
    </div>

    <!-- Augment Overlay -->
    <div id="augment-overlay">
        <h2 id="augment-player-turn" class="cinzel text-4xl text-white mb-10">WHITE PLAYER SELECT</h2>
        <div class="flex" id="augment-cards-container">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <h2 class="cinzel text-2xl text-center mb-6 border-b border-[#333] pb-2">STATUS</h2>
            <div class="mb-4">
                <span class="text-gray-400">TURN:</span>
                <span id="turn-display" class="float-right font-bold text-white">WHITE</span>
            </div>
            <div class="mb-4">
                <span class="text-gray-400">TIME:</span>
                <span id="timer-display" class="float-right font-mono">00:00</span>
            </div>
            <div class="flex-1 overflow-y-auto mt-4 border-t border-[#333] pt-4">
                <h3 class="text-sm text-[#c5a059] mb-2">ACTIVE AUGMENTS</h3>
                <ul id="active-augments" class="text-xs space-y-1"></ul>
            </div>
            <div class="mt-4 grid grid-cols-2 gap-2">
                <button onclick="undo()" class="bg-gray-800 hover:bg-gray-700 p-2 rounded text-xs">UNDO</button>
                <button onclick="location.reload()" class="bg-red-900 hover:bg-red-800 p-2 rounded text-xs text-white">RESET</button>
            </div>
        </div>

        <!-- Center Board -->
        <div id="board-wrapper">
            <div id="chess-board"></div>
        </div>

        <!-- Right Sidebar -->
        <div class="sidebar">
            <h2 class="cinzel text-2xl text-center mb-6 border-b border-[#333] pb-2">LOGS</h2>
            <div id="move-log" class="flex-1 overflow-y-auto text-xs space-y-1 font-mono text-gray-400 p-2">
            </div>
            <div class="mt-4 border-t border-[#333] pt-4">
                <h3 class="text-xs text-gray-500 mb-2">CAPTURED (WHITE)</h3>
                <div id="captured-white" class="captured-container"></div>
                <h3 class="text-xs text-gray-500 mt-2 mb-2">CAPTURED (BLACK)</h3>
                <div id="captured-black" class="captured-container"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Core Game Variables ---
        const board = document.getElementById('chess-board');
        const turnDisplay = document.getElementById('turn-display');
        const timerDisplay = document.getElementById('timer-display');
        const moveLog = document.getElementById('move-log');
        const activeAugmentsList = document.getElementById('active-augments');
        const statusNotif = document.getElementById('status-notif');

        let gameState = {
            board: [],
            turn: 'white',
            selected: null,
            history: [],
            startTime: null,
            augments: { white: [], black: [] },
            turnCount: 0,
            moveCount: 0,
            isAugmentPhase: false,
            timeStopTurns: 0, // Remaining turns for time stop
            undoUsed: 0
        };

        const PIECES = {
            white: { k: '♔', q: '♕', r: '♖', b: '♗', n: '♘', p: '♙' },
            black: { k: '♚', q: '♛', r: '♜', b: '♝', n: '♞', p: '♟' }
        };

        const AUGMENT_POOL = [
            { id: 'uranium', title: "열화우라늄날개안정분리철갑탄", desc: "비숍 이동 시 주변 1칸 적/아군 삭제(킹 제외) 후 비숍 사망" },
            { id: 'khan', title: "칸의 후예", desc: "비숍이 나이트로 변경. 킹이 나이트의 행마법 획득" },
            { id: 'real_king', title: "진정한 왕은 누구인가?", desc: "퀸 삭제. 킹이 퀸의 행마법 획득" },
            { id: 'colossus', title: "체크메이트의 거신병", desc: "내 모든 폰 전멸 시 d열 1행에 퀸 소환" },
            { id: 'chess960', title: "체스 960", desc: "내 기물(폰/킹 제외)의 위치를 무작위로 뒤섞음" },
            { id: 'heaven', title: "천국에 가는 길", desc: "다음 증강 선택 시 확정으로 '중력 반전' 등장" },
            { id: 'undo', title: "Undo!", desc: "되돌리기 무제한 활성화" },
            { id: 'frontline', title: "전방 전선", desc: "화이트 폰 전선을 기준으로 모든 기물 파괴(킹 제외) 및 전진" },
            { id: 'super_knight', title: "초살병기 나이트", desc: "나이트에게 룩의 행마 추가" },
            { id: 'shocking_pawns', title: "쇼킹 폰 월드", desc: "상대 무작위 기물 3개를 폰으로 변환" },
            { id: 'timestop', title: "시간 정지", desc: "3턴간 화이트만 행동 가능 (킹 전용 무적 이동 가능)" },
            { id: 'evolve_pawn', title: "졸병 진화", desc: "폰이 좌우로도 이동 가능" },
            { id: 'final_knight', title: "결전병기 나이트", desc: "나이트가 비숍처럼 대각선 이동 가능" },
            { id: 'sniper_bishop', title: "저격 비숍", desc: "비숍이 기물을 뛰어넘어 공격 가능" },
            { id: 'meteor_strike', title: "메테오 스트라이크", desc: "룩이 기물을 관통하여 공격" },
            { id: 'king_attack', title: "킹스 어택", desc: "킹이 대각선 2칸 위치로 도약 가능" },
            { id: 'necromancy', title: "네크로맨시", desc: "킹 이동 불가, 주변 빈 공간에 폰 소환 가능" },
            { id: 'gravity', title: "중력 반전", desc: "내 폰들의 전진 방향이 반대로 변경됨" },
            { id: 'royal_guard', title: "로열 가드", desc: "킹 주변 아군은 잡히지 않음" }
        ];

        // --- Initialization ---

        function initBoard() {
            const layout = [
                ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
                ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
                Array(8).fill(null),
                Array(8).fill(null),
                Array(8).fill(null),
                Array(8).fill(null),
                ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
                ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r']
            ];

            gameState.board = [];
            for (let r = 0; r < 8; r++) {
                gameState.board[r] = [];
                for (let c = 0; c < 8; c++) {
                    let piece = null;
                    if (r < 2) piece = { type: layout[r][c], color: 'black' };
                    if (r > 5) piece = { type: layout[7-r][c], color: 'white' };
                    gameState.board[r][c] = piece;
                }
            }
            renderBoard();
        }

        function renderBoard() {
            board.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    sq.dataset.row = r;
                    sq.dataset.col = c;
                    sq.onclick = () => handleSquareClick(r, c);

                    const piece = gameState.board[r][c];
                    if (piece) {
                        const pDiv = document.createElement('div');
                        pDiv.className = 'piece';
                        pDiv.textContent = PIECES[piece.color][piece.type];
                        pDiv.style.color = piece.color === 'white' ? '#fff' : '#000';
                        if (piece.color === 'black') {
                            pDiv.style.textShadow = '0 0 5px rgba(255,255,255,0.3)';
                        }
                        sq.appendChild(pDiv);
                    }
                    board.appendChild(sq);
                }
            }
        }

        // --- Game Logic ---

        function handleSquareClick(r, c) {
            if (gameState.isAugmentPhase) return;
            
            // Time Stop logic: Only white can move, and only king can move if turns > 0
            if (gameState.timeStopTurns > 0) {
                if (gameState.turn !== 'white') return;
                const piece = gameState.board[r][c];
                if (gameState.selected) {
                    const [sr, sc] = gameState.selected;
                    const movingPiece = gameState.board[sr][sc];
                    if (movingPiece.type !== 'k') {
                        gameState.selected = null;
                        renderBoard();
                        return;
                    }
                } else {
                    if (!piece || piece.color !== 'white' || piece.type !== 'k') return;
                }
            }

            const piece = gameState.board[r][c];

            if (gameState.selected) {
                const [sr, sc] = gameState.selected;
                if (sr === r && sc === c) {
                    gameState.selected = null;
                } else if (isValidMove(sr, sc, r, c)) {
                    executeMove(sr, sc, r, c);
                } else if (piece && piece.color === gameState.turn) {
                    gameState.selected = [r, c];
                }
            } else {
                if (piece && piece.color === gameState.turn) {
                    gameState.selected = [r, c];
                }
            }
            updateSelectionUI();
        }

        function isValidMove(sr, sc, dr, dc) {
            const piece = gameState.board[sr][sc];
            const target = gameState.board[dr][dc];
            if (target && target.color === piece.color) return false;

            const drDiff = dr - sr;
            const dcDiff = dc - sc;
            const absDr = Math.abs(drDiff);
            const absDc = Math.abs(dcDiff);

            // Time Stop: King can move anywhere (God mode)
            if (gameState.timeStopTurns > 0 && piece.type === 'k') return true;

            // Necromancy Check
            if (hasAugment(piece.color, 'necromancy') && piece.type === 'k') return false;

            // Basic Moves
            switch(piece.type) {
                case 'p':
                    const dir = (piece.color === 'white' && !hasAugment('white', 'gravity')) || (piece.color === 'black' && hasAugment('black', 'gravity')) ? -1 : 1;
                    // Normal
                    if (dc === sc && !target) {
                        if (dr === sr + dir) return true;
                        if ((sr === 6 || sr === 1) && dr === sr + 2 * dir && !gameState.board[sr + dir][sc]) return true;
                    }
                    // Capture
                    if (absDc === 1 && dr === sr + dir && target) return true;
                    // Evolve Pawn
                    if (hasAugment(piece.color, 'evolve_pawn') && dr === sr && absDc === 1 && !target) return true;
                    break;
                case 'n':
                    const isN = (absDr === 2 && absDc === 1) || (absDr === 1 && absDc === 2);
                    if (isN) return true;
                    if (hasAugment(piece.color, 'super_knight') && (sr === dr || sc === dc) && isPathClear(sr, sc, dr, dc)) return true;
                    if (hasAugment(piece.color, 'final_knight') && absDr === absDc && isPathClear(sr, sc, dr, dc)) return true;
                    break;
                case 'b':
                    if (absDr === absDc && (hasAugment(piece.color, 'sniper_bishop') || isPathClear(sr, sc, dr, dc))) return true;
                    if (hasAugment(piece.color, 'khan') && ((absDr === 2 && absDc === 1) || (absDr === 1 && absDc === 2))) return true;
                    break;
                case 'r':
                    if ((sr === dr || sc === dc) && (hasAugment(piece.color, 'meteor_strike') || isPathClear(sr, sc, dr, dc))) return true;
                    break;
                case 'q':
                    if ((sr === dr || sc === dc || absDr === absDc) && isPathClear(sr, sc, dr, dc)) return true;
                    break;
                case 'k':
                    if (absDr <= 1 && absDc <= 1) return true;
                    if (hasAugment(piece.color, 'king_attack') && absDr === 2 && absDc === 2) return true;
                    if (hasAugment(piece.color, 'khan') && ((absDr === 2 && absDc === 1) || (absDr === 1 && absDc === 2))) return true;
                    if (hasAugment(piece.color, 'real_king') && (sr === dr || sc === dc || absDr === absDc) && isPathClear(sr, sc, dr, dc)) return true;
                    break;
            }
            return false;
        }

        function isPathClear(sr, sc, dr, dc) {
            const stepR = dr === sr ? 0 : (dr > sr ? 1 : -1);
            const stepC = dc === sc ? 0 : (dc > sc ? 1 : -1);
            let r = sr + stepR;
            let c = sc + stepC;
            while (r !== dr || c !== dc) {
                if (gameState.board[r][c]) return false;
                r += stepR;
                c += stepC;
            }
            return true;
        }

        async function executeMove(sr, sc, dr, dc) {
            const piece = gameState.board[sr][sc];
            const target = gameState.board[dr][dc];

            // Royal Guard Protection
            if (target && hasAugment(target.color, 'royal_guard')) {
                const kingPos = findKing(target.color);
                if (kingPos && Math.abs(kingPos.r - dr) <= 1 && Math.abs(kingPos.c - dc) <= 1) {
                    gameState.selected = null;
                    renderBoard();
                    return;
                }
            }

            // Save history
            gameState.history.push(JSON.parse(JSON.stringify(gameState.board)));

            // Capture logic
            if (target) {
                const list = target.color === 'white' ? 'captured-white' : 'captured-black';
                const capDiv = document.createElement('div');
                capDiv.textContent = PIECES[target.color][target.type];
                capDiv.style.fontSize = '1.5rem';
                document.getElementById(list).appendChild(capDiv);
                
                if (target.type === 'k') {
                    endGame(piece.color);
                    return;
                }
            }

            // Uranium Augment
            if (piece.type === 'b' && hasAugment(piece.color, 'uranium')) {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const tr = dr + i, tc = dc + j;
                        if (tr >= 0 && tr < 8 && tc >= 0 && tc < 8) {
                            const p = gameState.board[tr][tc];
                            if (p && p.type !== 'k') gameState.board[tr][tc] = null;
                        }
                    }
                }
                gameState.board[sr][sc] = null;
            } else {
                gameState.board[dr][dc] = piece;
                gameState.board[sr][sc] = null;
            }

            // Log
            const notation = `${piece.type}${String.fromCharCode(97+sc)}${8-sr}→${String.fromCharCode(97+dc)}${8-dr}`;
            const logItem = document.createElement('div');
            logItem.textContent = notation;
            moveLog.prepend(logItem);

            // Finalize Turn
            gameState.selected = null;
            gameState.moveCount++;

            if (gameState.timeStopTurns > 0) {
                gameState.timeStopTurns--;
            } else {
                gameState.turn = gameState.turn === 'white' ? 'black' : 'white';
            }

            gameState.turnCount++;
            
            // Augment Trigger: 6th move first, then every 4 moves (total turns)
            if ((gameState.moveCount === 6) || (gameState.moveCount > 6 && (gameState.moveCount - 6) % 4 === 0)) {
                await startAugmentPhase();
            }

            renderBoard();
            updateUI();
        }

        // --- Augments ---

        async function startAugmentPhase() {
            gameState.isAugmentPhase = true;
            await showAugmentModal('white');
            await showAugmentModal('black');
            gameState.isAugmentPhase = false;
        }

        function showAugmentModal(player) {
            return new Promise(resolve => {
                const overlay = document.getElementById('augment-overlay');
                const container = document.getElementById('augment-cards-container');
                const title = document.getElementById('augment-player-turn');
                
                title.textContent = `${player.toUpperCase()} PLAYER SELECT`;
                container.innerHTML = '';
                overlay.style.display = 'flex';

                let pool = [...AUGMENT_POOL];
                // Road to Heaven logic
                if (hasAugment(player, 'heaven')) {
                    const grav = pool.find(a => a.id === 'gravity');
                    pool = [grav, ...pool.filter(a => a.id !== 'gravity').sort(() => 0.5 - Math.random()).slice(0, 2)];
                } else {
                    pool = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
                }

                pool.forEach(aug => {
                    const card = document.createElement('div');
                    card.className = 'augment-card';
                    card.innerHTML = `
                        <div class="card-title cinzel">${aug.title}</div>
                        <div class="card-desc">${aug.desc}</div>
                    `;
                    card.onclick = async () => {
                        await applyAugment(player, aug);
                        overlay.style.display = 'none';
                        resolve();
                    };
                    container.appendChild(card);
                });
            });
        }

        async function applyAugment(player, augment) {
            // 3s Delay logic
            statusNotif.style.display = 'block';
            statusNotif.textContent = `${augment.title} 발동 중...`;
            await new Promise(r => setTimeout(r, 3000));
            statusNotif.style.display = 'none';

            gameState.augments[player].push(augment.id);
            const li = document.createElement('li');
            li.textContent = `[${player.toUpperCase()}] ${augment.title}`;
            li.className = player === 'white' ? 'text-white' : 'text-gray-400';
            activeAugmentsList.appendChild(li);

            // Immediate effects
            if (augment.id === 'frontline') {
                // Modified Frontline: Based on white pawns, annihilates and pushes forward
                // Regardless of who picks it, it triggers relative to white's advancement
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const p = gameState.board[r][c];
                        if (p && p.type === 'p' && p.color === 'white') {
                            const nr = r - 1;
                            if (nr >= 0) {
                                if (gameState.board[nr][c] && gameState.board[nr][c].type !== 'k') {
                                    gameState.board[nr][c] = null; // Smash pieces
                                }
                                if (!gameState.board[nr][c]) {
                                    gameState.board[nr][c] = p;
                                    gameState.board[r][c] = null;
                                }
                            }
                        }
                    }
                }
            } else if (augment.id === 'timestop') {
                // Time stop: Only white gets the power
                gameState.timeStopTurns = 3;
                gameState.turn = 'white';
            } else if (augment.id === 'shocking_pawns') {
                const opponent = player === 'white' ? 'black' : 'white';
                let targets = [];
                for(let r=0; r<8; r++) {
                    for(let c=0; c<8; c++) {
                        const p = gameState.board[r][c];
                        if(p && p.color === opponent && p.type !== 'k') targets.push({r,c});
                    }
                }
                targets.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(t => {
                    gameState.board[t.r][t.c].type = 'p';
                });
            } else if (augment.id === 'chess960') {
                let pieces = [];
                for(let r=0; r<8; r++) {
                    for(let c=0; c<8; c++) {
                        const p = gameState.board[r][c];
                        if(p && p.color === player && p.type !== 'p' && p.type !== 'k') {
                            pieces.push({...p});
                            gameState.board[r][c] = null;
                        }
                    }
                }
                pieces.sort(() => 0.5 - Math.random());
                let idx = 0;
                const targetRow = player === 'white' ? 7 : 0;
                for(let c=0; c<8; c++) {
                    if(!gameState.board[targetRow][c]) {
                        gameState.board[targetRow][c] = pieces[idx++];
                        if(idx >= pieces.length) break;
                    }
                }
            } else if (augment.id === 'necromancy') {
                // Necromancy: Spawn pawns
                const king = findKing(player);
                if (king) {
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            const tr = king.r + i, tc = king.c + j;
                            if (tr >= 0 && tr < 8 && tc >= 0 && tc < 8 && !gameState.board[tr][tc]) {
                                gameState.board[tr][tc] = { type: 'p', color: player };
                            }
                        }
                    }
                }
            } else if (augment.id === 'colossus') {
                // Check if no pawns
                checkColossus(player);
            }

            renderBoard();
        }

        function checkColossus(player) {
            let hasPawn = false;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(gameState.board[r][c]?.color === player && gameState.board[r][c]?.type === 'p') hasPawn = true;
                }
            }
            if(!hasPawn && hasAugment(player, 'colossus')) {
                gameState.board[player === 'white' ? 7 : 0][3] = { type: 'q', color: player };
            }
        }

        // --- Utils ---

        function hasAugment(player, id) {
            return gameState.augments[player].includes(id);
        }

        function findKing(color) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (gameState.board[r][c]?.type === 'k' && gameState.board[r][c]?.color === color) return {r, c};
                }
            }
            return null;
        }

        function updateUI() {
            turnDisplay.textContent = gameState.turn.toUpperCase();
            turnDisplay.style.color = gameState.turn === 'white' ? '#fff' : '#aaa';
            
            // Check Colossus again
            checkColossus('white');
            checkColossus('black');
        }

        function updateSelectionUI() {
            document.querySelectorAll('.square').forEach(s => {
                s.classList.remove('selected');
            });
            if (gameState.selected) {
                const [r, c] = gameState.selected;
                document.querySelector(`[data-row="${r}"][data-col="${c}"]`).classList.add('selected');
            }
        }

        function undo() {
            if (gameState.history.length > 0) {
                if (gameState.undoUsed > 0 && !hasAugment(gameState.turn === 'white' ? 'black' : 'white', 'undo')) return;
                gameState.board = gameState.history.pop();
                gameState.turn = gameState.turn === 'white' ? 'black' : 'white';
                gameState.undoUsed++;
                renderBoard();
                updateUI();
            }
        }

        function startGame() {
            document.getElementById('lobby').style.display = 'none';
            gameState.startTime = Date.now();
            setInterval(updateTimer, 1000);
            initBoard();
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        function endGame(winner) {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'rgba(0,0,0,0.9)';
            overlay.style.display = 'flex';
            overlay.style.flexDirection = 'column';
            overlay.style.justifyContent = 'center';
            overlay.style.alignItems = 'center';
            overlay.style.zIndex = '1000';
            
            overlay.innerHTML = `
                <h1 class="cinzel text-6xl text-white mb-8">${winner.toUpperCase()} VICTORIOUS</h1>
                <button onclick="location.reload()" class="btn-gold cinzel">RETURN TO LOBBY</button>
            `;
            document.body.appendChild(overlay);
            document.getElementById('chess-board').classList.add('shake');
        }

        function showEncyclopedia() {
            const list = AUGMENT_POOL.map(a => `<div class="mb-4"><strong class="text-[#c5a059]">${a.title}:</strong> <span class="text-gray-300 text-sm">${a.desc}</span></div>`).join('');
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '50%'; modal.style.left = '50%';
            modal.style.transform = 'translate(-50%, -50%)';
            modal.style.width = '80%'; modal.style.maxHeight = '80vh';
            modal.style.background = '#1a1a20'; modal.style.border = '2px solid #c5a059';
            modal.style.padding = '30px'; modal.style.zIndex = '300';
            modal.style.overflowY = 'auto';
            modal.innerHTML = `<h2 class="cinzel text-3xl mb-6">AUGMENT ENCYCLOPEDIA</h2>${list}<button onclick="this.parentElement.remove()" class="mt-6 bg-gray-700 p-2 w-full">CLOSE</button>`;
            document.body.appendChild(modal);
        }

    </script>
</body>
</html>
